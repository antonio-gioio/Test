services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ais
      POSTGRES_DB: aisstream
    ports:
      - "5432:5432"
    volumes:
      - ais-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aisstream"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/AisStream.Api
    environment:
      # Override appsettings via env. Double underscore = nested config key.
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=aisstream;Username=postgres;Password=ais"
      ASPNETCORE_URLS: "http://+:5000"
      # Set a strong key in real deployments.
      Jwt__Key: "dev-only-insecure-signing-key-change-me-please-32+chars"
      # Provide an aisstream.io key to use the live feed instead of the simulator:
      # AISSTREAM__APIKEY: "your-key-here"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ais-pgdata:
